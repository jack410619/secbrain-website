<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<!-- 🔥 修復：iOS Safari 視口适配（核心解決卡瀏覽器欄） -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Brain Mirror v5.0 | Liquid Glass</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg-deep: #080a12;
    --glass-border: rgba(255, 255, 255, 0.12);
    --glass-highlight: rgba(255, 255, 255, 0.08);
    --glass-surface: rgba(255, 255, 255, 0.02);
    --accent-primary: #818cf8;
    --accent-secondary: #c084fc;
    --accent-glow: rgba(129, 140, 248, 0.35);
    --accent-tertiary: #38bdf8;
    /* 🔥 新增：iOS 安全區域變數 */
    --safe-bottom: env(safe-area-inset-bottom);
    --safe-top: env(safe-area-inset-top);
    transition: --accent-primary 0.8s ease, --accent-secondary 0.8s ease, --accent-glow 0.8s ease, --accent-tertiary 0.8s ease;
}

/* 早晨主題 (5:00-12:00) - 清新藍紫 */
.theme-morning {
    --accent-primary: #60a5fa;
    --accent-secondary: #a78bfa;
    --accent-glow: rgba(96, 165, 250, 0.35);
    --accent-tertiary: #34d399;
}

/* 下午主題 (12:00-18:00) - 溫暖金橙 */
.theme-afternoon {
    --accent-primary: #fbbf24;
    --accent-secondary: #f97316;
    --accent-glow: rgba(251, 191, 36, 0.35);
    --accent-tertiary: #fb923c;
}

/* 晚上主題 (18:00-22:00) - 深邃紫紅 */
.theme-evening {
    --accent-primary: #c084fc;
    --accent-secondary: #f472b6;
    --accent-glow: rgba(192, 132, 252, 0.35);
    --accent-tertiary: #fb7185;
}

/* 深夜主題 (22:00-5:00) - 靜謐藍綠 */
.theme-night {
    --accent-primary: #818cf8;
    --accent-secondary: #38bdf8;
    --accent-glow: rgba(129, 140, 248, 0.25);
    --accent-tertiary: #2dd4bf;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg-deep);
    color: #ffffff;
    overflow: hidden;
    /* 🔥 修復：Safari 高度問題，不使用 100vh */
    height: 100dvh;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    selection-background-color: var(--accent-primary);
    /* 🔥 修復：頂部避開 iOS 瀏覽器欄 */
    padding-top: var(--safe-top);
}

/* Liquid Mesh Background */
.liquid-universe {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: radial-gradient(circle at 50% 50%, #0b1025, var(--bg-deep));
    overflow: hidden;
}

/* 動態漸變背景層 */
.liquid-universe::before {
    content: '';
    position: absolute;
    inset: -50%;
    background: 
        radial-gradient(circle at 20% 30%, rgba(129, 140, 248, 0.15), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(192, 132, 252, 0.12), transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(56, 189, 248, 0.1), transparent 50%);
    animation: gradientShift 20s ease-in-out infinite alternate;
    filter: blur(60px);
}

@keyframes gradientShift {
    0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
    50% { transform: translate(3%, -2%) scale(1.05); opacity: 0.7; }
    100% { transform: translate(-2%, 3%) scale(0.95); opacity: 0.6; }
}

.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(130px);
    opacity: 0.3;
    animation: drift 80s infinite alternate cubic-bezier(0.3, 0.1, 0.2, 0.9);
    mix-blend-mode: screen;
    box-shadow: 0 0 80px var(--accent-glow), 0 0 150px rgba(192, 132, 252, 0.06);
    /* 🔥 修復：確保在手機上也能完整顯示 */
    max-width: 100vw;
    max-height: 100vh;
}

.orb-1 { 
    width: 80vw; height: 80vw; 
    max-width: 500px; max-height: 500px;
    background: radial-gradient(circle, var(--accent-primary), transparent 70%); 
    top: 10%; left: 5%; 
    animation-duration: 90s;
}
.orb-2 { 
    width: 75vw; height: 75vw; 
    max-width: 450px; max-height: 450px;
    background: radial-gradient(circle, var(--accent-secondary), transparent 70%); 
    bottom: 10%; right: 5%; 
    animation-delay: -20s;
    animation-duration: 100s;
}
.orb-3 { 
    width: 55vw; height: 55vw; 
    max-width: 350px; max-height: 350px;
    background: radial-gradient(circle, var(--accent-tertiary), transparent 70%); 
    top: 40%; left: 40%; 
    opacity: 0.25; 
    animation-delay: -35s;
    animation-duration: 110s;
}

/* 新增：小型浮動粒子 */
.orb-particle {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    mix-blend-mode: screen;
    animation: particleFloat 60s infinite ease-in-out;
    opacity: 0.15;
}

.orb-particle-1 {
    width: 30vw; height: 30vw;
    max-width: 180px; max-height: 180px;
    background: radial-gradient(circle, var(--accent-primary), transparent 70%);
    top: 60%; left: 15%;
    animation-delay: -10s;
}

.orb-particle-2 {
    width: 25vw; height: 25vw;
    max-width: 150px; max-height: 150px;
    background: radial-gradient(circle, var(--accent-tertiary), transparent 70%);
    top: 20%; left: 70%;
    animation-delay: -30s;
}

.orb-particle-3 {
    width: 20vw; height: 20vw;
    max-width: 120px; max-height: 120px;
    background: radial-gradient(circle, var(--accent-secondary), transparent 70%);
    top: 70%; left: 80%;
    animation-delay: -45s;
}

@keyframes particleFloat {
    0%, 100% { 
        transform: translate(0, 0) scale(1); 
        opacity: 0.15;
    }
    25% { 
        transform: translate(10%, -15%) scale(1.1); 
        opacity: 0.2;
    }
    50% { 
        transform: translate(-5%, 10%) scale(0.95); 
        opacity: 0.18;
    }
    75% { 
        transform: translate(15%, 5%) scale(1.05); 
        opacity: 0.22;
    }
}

@keyframes drift {
    0% { 
        transform: translate(0, 0) scale(1) rotate(0deg); 
        opacity: 0.28; 
    }
    25% { 
        opacity: 0.38; 
        transform: translate(6%, 4%) scale(1.03) rotate(8deg);
    }
    50% { 
        opacity: 0.42; 
        transform: translate(12%, 8%) scale(1.06) rotate(16deg);
    }
    75% {
        opacity: 0.36;
        transform: translate(15%, 10%) scale(1.09) rotate(24deg);
    }
    100% { 
        transform: translate(20%, 15%) scale(1.12) rotate(32deg); 
        opacity: 0.34; 
    }
}

/* Noise Texture */
.noise {
    position: fixed;
    inset: 0;
    z-index: -1;
    opacity: 0.02;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
}

/* Liquid Glass Component */
.glass-panel {
    background: linear-gradient(135deg, var(--glass-surface), rgba(255,255,255,0.01));
    backdrop-filter: blur(35px) saturate(160%);
    -webkit-backdrop-filter: blur(35px) saturate(160%);
    border: 0.5px solid var(--glass-border);
    border-top: 0.5px solid rgba(255, 255, 255, 0.22);
    border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
    box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.35),
        inset 0 0 0 1px rgba(255, 255, 255, 0.05),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s ease;
}

.glass-panel:active {
    transform: scale(0.99);
}

/* Content Transitions */
.tab-content {
    display: none;
    height: 100%;
    animation: flowIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.tab-content.active { 
    display: flex; 
    flex-direction: column; 
}

@keyframes flowIn {
    0% { opacity: 0; transform: scale(0.96) translateY(20px); filter: blur(10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
}

/* Input Styling */
.liquid-input {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 32px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.liquid-input:focus-within {
    background: rgba(255, 255, 255, 0.06);
    border-color: var(--accent-primary);
    box-shadow: 0 0 30px var(--accent-glow);
}

textarea {
    background: transparent !important;
    border: none !important;
    outline: none !important;
    color: rgba(255,255,255,0.9);
}

/* Button Aesthetics */
.btn-fluid {
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
    color: #0f172a;
    border-radius: 24px;
    font-weight: 600;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
    box-shadow: 0 10px 30px -5px rgba(255, 255, 255, 0.15);
}

.btn-fluid:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 15px 40px -5px var(--accent-glow);
}

.btn-fluid:active { 
    transform: scale(0.96); 
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.btn-fluid::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    transition: left 0.6s ease;
    z-index: 0;
}
.btn-fluid:hover::before { left: 100%; }

/* Navigation Dock */
.dock-wrap {
    position: fixed;
    /* 🔥 修復：底部避開 iOS Safari 工具欄（核心！） */
    bottom: calc(24px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%);
    width: fit-content;
    z-index: 1000;
}

.dock {
    display: flex;
    gap: 10px;
    padding: 10px;
    border-radius: 36px;
    background: rgba(15, 15, 20, 0.65);
    backdrop-filter: blur(35px) saturate(150%);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
}

.dock-item {
    width: 52px; height: 52px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 22px;
    color: rgba(255,255,255,0.5);
    transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
    position: relative;
    border: 1px solid transparent;
}

.dock-item:active { transform: scale(0.9); }

.dock-item.active {
    background: rgba(255, 255, 255, 0.12);
    color: #ffffff;
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transform: translateY(-3px);
}

.dock-item svg { width: 22px; height: 22px; z-index: 1; stroke-width: 2; }

.active-glow {
    position: absolute;
    bottom: 5px;
    width: 4px; height: 4px;
    background: var(--accent-primary);
    border-radius: 50%;
    filter: blur(1.5px);
    box-shadow: 0 0 10px var(--accent-primary), 0 0 20px var(--accent-secondary);
    opacity: 0;
    transition: all 0.4s ease;
}

.active .active-glow { 
    opacity: 1; 
    transform: scale(1.4); 
}

/* 動態色彩元素 - 使用 CSS 變數 */
.text-accent-primary { color: var(--accent-primary); }
.text-accent-secondary { color: var(--accent-secondary); }
.text-accent-tertiary { color: var(--accent-tertiary); }
.bg-accent-primary { background-color: var(--accent-primary); }
.shadow-accent-glow { box-shadow: 0 0 30px var(--accent-glow); }
.border-accent-primary { border-color: var(--accent-primary); }

.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body>
    <div class="liquid-universe">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb-particle orb-particle-1"></div>
        <div class="orb-particle orb-particle-2"></div>
        <div class="orb-particle orb-particle-3"></div>
    </div>
    <div class="noise"></div>

    <div class="max-w-md mx-auto w-full h-full flex flex-col px-6 relative z-10">
        <!-- Header -->
        <header class="pt-16 pb-8">
            <div class="flex items-center justify-between">
                <div>
                    <!-- 優化字重 + 30分鐘更新問候語 -->
                    <h1 class="text-4xl font-[300] tracking-tight text-white/90" id="greetingText">
                        Good Morning, Jack
                    </h1>
                    <h2 class="text-xl font-[200] tracking-tight text-white/60 mt-1">
                        Brain <span class="font-semibold text-accent-primary">Mirror</span>
                    </h2>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-accent-primary animate-pulse" style="box-shadow: 0 0 10px var(--accent-primary);"></span>
                        <p class="text-[9px] tracking-[0.3em] text-white/40 uppercase font-semibold">Neural Link Established</p>
                    </div>
                </div>
                <div class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-[9px] font-bold border-white/10 text-white/60">v5.0</div>
            </div>
        </header>

        <main class="flex-1 overflow-hidden relative">
            <!-- Tab: Capture -->
            <div id="content-submit" class="tab-content active">
                <div class="glass-panel rounded-[40px] p-7 flex-1 flex flex-col mb-28 relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-br from-white/[0.03] to-transparent pointer-events-none"></div>
                    <textarea id="noteInput" class="w-full flex-1 bg-transparent text-lg font-light outline-none resize-none placeholder-white/15 no-scrollbar leading-relaxed py-2" placeholder="Capture thoughts in the flow..."></textarea>
                    <button onclick="submitNote()" id="btn-submit" class="btn-fluid w-full py-4 mt-6 text-[10px] font-bold uppercase tracking-[0.25em] relative z-10">Capture Fragment</button>
                </div>
            </div>

            <!-- Tab: Search -->
            <div id="content-search" class="tab-content">
                <div class="liquid-input p-1.5 flex items-center mb-6 shadow-lg shadow-accent-glow">
                    <input type="text" id="searchInput" class="flex-1 bg-transparent px-5 py-4 outline-none text-sm font-light placeholder-white/30" placeholder="Query neural archives...">
                    <button onclick="runSearch()" class="w-11 h-11 rounded-[20px] bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all hover:scale-105 active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </div>
                <div id="searchResult" class="glass-panel rounded-[32px] p-7 text-sm text-white/80 hidden overflow-y-auto no-scrollbar mb-28 border-white/5 leading-relaxed font-light"></div>
            </div>

            <!-- Tab: Sync -->
            <div id="content-paste" class="tab-content">
                <div class="glass-panel rounded-[32px] p-1.5 mb-6 flex gap-2 border-white/10">
                    <input type="text" id="webPasteInput" class="flex-1 bg-white/5 rounded-2xl px-5 py-3 text-sm outline-none font-light placeholder-white/20" placeholder="Web → Cloud Sync">
                    <button onclick="submitWebPaste()" class="bg-white text-black px-6 rounded-2xl text-[9px] font-bold uppercase tracking-widest hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] transition-shadow">Push</button>
                </div>
                
                <div id="sync-placeholder" class="flex-1 flex flex-col items-center justify-center border border-dashed border-white/10 rounded-[40px] mb-28 group cursor-pointer hover:bg-white/[0.02] transition-colors" onclick="fetchPasteboard()">
                    <div class="w-20 h-20 rounded-full glass-panel flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-500" style="box-shadow: 0 0 30px var(--accent-glow);">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-accent-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <p class="text-[10px] text-white/30 tracking-[0.4em] mb-2">PULSE READY</p>
                    <p class="text-[8px] text-white/15 tracking-widest">Tap to sync</p>
                </div>
                <div id="pasteList" class="flex-1 space-y-4 overflow-y-auto no-scrollbar mb-28"></div>
            </div>
        </main>

        <!-- Dock -->
        <div class="dock-wrap">
            <nav class="dock">
                <button onclick="showTab('submit')" id="tab-submit" class="dock-item active">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                    </svg>
                    <div class="active-glow"></div>
                </button>
                <button onclick="showTab('search')" id="tab-search" class="dock-item">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <div class="active-glow"></div>
                </button>
                <button onclick="showTab('paste')" id="tab-paste" class="dock-item">
                    <svg fill="none" viewBox="0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    <div class="active-glow"></div>
                </button>
            </nav>
        </div>
    </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwKnAJ0mZ_p45d9aqUHY30uAcNWpGDPrSM6XTwyBLsJ5uH49M2TS-CTASTedaHOM2OJ/exec";

// UTC+8 動態問候語 + 30分鐘更新 + 色彩主題切換
function updateGreeting() {
    const now = new Date();
    const utcOffset = 8;
    const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
    const localTime = new Date(utcTime + (3600000 * utcOffset));
    const hour = localTime.getHours();

    let greeting, themeClass;
    if (hour >= 5 && hour < 12) {
        greeting = "Good Morning, Jack";
        themeClass = "theme-morning";
    } else if (hour >= 12 && hour < 18) {
        greeting = "Good Afternoon, Jack";
        themeClass = "theme-afternoon";
    } else if (hour >= 18 && hour < 22) {
        greeting = "Good Evening, Jack";
        themeClass = "theme-evening";
    } else {
        greeting = "Good Night, Jack";
        themeClass = "theme-night";
    }

    // 更新問候語
    document.getElementById('greetingText').textContent = greeting;
    document.getElementById('greetingText').style.opacity = "0";
    setTimeout(() => {
        document.getElementById('greetingText').style.opacity = "1";
        document.getElementById('greetingText').style.transition = "opacity 0.8s ease";
    }, 100);

    // 更新色彩主題
    document.documentElement.className = themeClass;
}

// 🔥 30分鐘自動更新 (1800000 毫秒)
window.onload = function() {
    updateGreeting();
    setInterval(updateGreeting, 1800000);
};

// 原有功能完全保留
function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
    document.getElementById('content-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (window.navigator.vibrate) window.navigator.vibrate(5);
}

async function submitNote() {
    const text = document.getElementById('noteInput').value;
    if(!text) return;
    const btn = document.getElementById('btn-submit');
    const originalText = btn.innerText;
    btn.innerText = "Syncing...";
    btn.style.opacity = "0.7";
    try {
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'submit', content: text }) });
        document.getElementById('noteInput').value = "";
        btn.innerText = "Captured";
        setTimeout(() => { btn.innerText = originalText; btn.style.opacity = "1"; }, 2000);
    } catch(e) {
        btn.innerText = "Retry";
    }
}

async function runSearch() {
    const query = document.getElementById('searchInput').value;
    const resDiv = document.getElementById('searchResult');
    resDiv.classList.remove('hidden');
    resDiv.innerHTML = "<div class='py-12 flex flex-col items-center'><div class='w-6 h-6 border-2 border-accent-primary/30 border-t-accent-primary rounded-full animate-spin mb-4'></div><div class='text-[9px] tracking-[0.3em] opacity-40 uppercase'>Scanning Neural Web...</div></div>";
    try {
        const res = await fetch(`${GAS_URL}?action=search&q=${encodeURIComponent(query)}`);
        const data = await res.json();
        resDiv.innerHTML = `<div class='text-accent-primary text-[9px] mb-4 tracking-[0.3em] uppercase font-bold'>Fragment Retrieved</div><div class="opacity-90 leading-relaxed">${data.answer}</div>`;
    } catch(e) {
        resDiv.innerHTML = "<div class='text-white/50'>Search unavailable.</div>";
    }
}

async function fetchPasteboard() {
    const list = document.getElementById('pasteList');
    const placeholder = document.getElementById('sync-placeholder');
    
    if(placeholder.classList.contains('hidden')) {
        list.innerHTML = "<div class='flex justify-center py-8'><div class='w-6 h-6 border-2 border-accent-primary/30 border-t-accent-primary rounded-full animate-spin'></div></div>";
    } else {
        placeholder.innerHTML = "<div class='w-10 h-10 border-2 border-accent-primary/30 border-t-accent-primary rounded-full animate-spin'></div>";
    }

    try {
        const response = await fetch(`${GAS_URL}?action=getPaste`);
        const items = await response.json();
        placeholder.classList.add('hidden');
        list.innerHTML = "";
        if(items.length === 0) {
            placeholder.classList.remove('hidden');
            placeholder.innerHTML = "<div class='w-16 h-16 rounded-full glass-panel flex items-center justify-center mb-4'><svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-white/20' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4' /></svg></div><p class='text-[10px] text-white/30 tracking-[0.2em]'>Buffer Empty</p>";
            return;
        }
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.style.animationDelay = `${index * 0.05}s`;
            div.className = "glass-panel p-6 rounded-3xl active:scale-[0.97] transition-all animate-[flowIn_0.5s_ease-out_forwards] cursor-pointer border-white/5";
            div.innerHTML = `<div class='text-[8px] text-accent-primary mb-2 font-bold tracking-widest uppercase'>Cloud Fragment</div><div class='text-sm text-white/80 font-light leading-relaxed'>${item.content}</div>`;
            div.onclick = () => copyAndDelete(item.id, item.content);
            list.appendChild(div);
        });
    } catch (e) {
        if(placeholder.classList.contains('hidden')) {
             list.innerHTML = "<div class='text-accent-secondary text-center py-8'>Sync Failed</div>";
        } else {
            placeholder.innerHTML = "<p class='text-accent-secondary text-[10px] tracking-widest'>SYNC FAILED</p>";
        }
    }
}

async function copyAndDelete(id, text) {
    try {
        await navigator.clipboard.writeText(text);
        await fetch(`${GAS_URL}?action=deletePaste&id=${id}`);
        fetchPasteboard();
    } catch(e) { console.error(e); }
}

async function submitWebPaste() {
    const text = document.getElementById('webPasteInput').value;
    if(!text) return;
    const btn = document.querySelector('#content-paste button');
    const originalText = btn.innerText;
    btn.innerText = "...";
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'submitPaste', content: text }) });
    document.getElementById('webPasteInput').value = "";
    btn.innerText = "Done";
    setTimeout(() => btn.innerText = originalText, 1500);
}
</script>
