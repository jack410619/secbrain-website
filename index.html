<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Brain Mirror v5.0 | Liquid Glass</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
/* CSS Variables Definition for Smooth Gradient Transitions */
@property --bg-deep { syntax: '<color>'; inherits: true; initial-value: #080a12; }
@property --bg-center { syntax: '<color>'; inherits: true; initial-value: #0b1025; }
@property --bg-blob-1 { syntax: '<color>'; inherits: true; initial-value: rgba(129, 140, 248, 0.18); }
@property --bg-blob-2 { syntax: '<color>'; inherits: true; initial-value: rgba(192, 132, 252, 0.15); }
@property --bg-blob-3 { syntax: '<color>'; inherits: true; initial-value: rgba(56, 189, 248, 0.12); }
@property --accent-primary { syntax: '<color>'; inherits: true; initial-value: #818cf8; }
@property --accent-secondary { syntax: '<color>'; inherits: true; initial-value: #38bdf8; }
@property --accent-tertiary { syntax: '<color>'; inherits: true; initial-value: #2dd4bf; }
@property --accent-glow { syntax: '<color>'; inherits: true; initial-value: rgba(129, 140, 248, 0.25); }
@property --accent-shadow { syntax: '<color>'; inherits: true; initial-value: rgba(192, 132, 252, 0.06); }

:root {
    --glass-border: rgba(255, 255, 255, 0.12);
    --glass-highlight: rgba(255, 255, 255, 0.08);
    --glass-surface: rgba(255, 255, 255, 0.02);
    --safe-bottom: env(safe-area-inset-bottom);
    --safe-top: env(safe-area-inset-top);
    
    transition: 
        --bg-deep 1.5s ease, --bg-center 1.5s ease,
        --bg-blob-1 1.5s ease, --bg-blob-2 1.5s ease, --bg-blob-3 1.5s ease,
        --accent-primary 1.5s ease, --accent-secondary 1.5s ease, 
        --accent-tertiary 1.5s ease, --accent-glow 1.5s ease,
        --accent-shadow 1.5s ease;
}

/* Base / Night Theme */
:root, .theme-night { 
    --bg-deep: #080a12; 
    --bg-center: #0b1025; 
    --accent-primary: #818cf8; 
    --accent-secondary: #38bdf8; 
    --accent-tertiary: #2dd4bf; 
    --accent-glow: rgba(129, 140, 248, 0.25); 
    --bg-blob-1: rgba(129, 140, 248, 0.18); 
    --bg-blob-2: rgba(192, 132, 252, 0.15); 
    --bg-blob-3: rgba(56, 189, 248, 0.12);
    --accent-shadow: rgba(192, 132, 252, 0.06);
}

/* Morning Theme */
.theme-morning { 
    --bg-deep: #170d12; 
    --bg-center: #2b1820; 
    --accent-primary: #ff5e62; 
    --accent-secondary: #ff9966; 
    --accent-tertiary: #00f2fe; 
    --accent-glow: rgba(255, 94, 98, 0.4); 
    --bg-blob-1: rgba(255, 94, 98, 0.18); 
    --bg-blob-2: rgba(255, 153, 102, 0.15); 
    --bg-blob-3: rgba(0, 242, 254, 0.12);
    --accent-shadow: rgba(255, 153, 102, 0.06);
}

/* Afternoon Theme */
.theme-afternoon { 
    --bg-deep: #07131e; 
    --bg-center: #0e263d; 
    --accent-primary: #fbbf24; 
    --accent-secondary: #f97316; 
    --accent-tertiary: #38bdf8; 
    --accent-glow: rgba(251, 191, 36, 0.35); 
    --bg-blob-1: rgba(251, 191, 36, 0.18); 
    --bg-blob-2: rgba(249, 115, 22, 0.15); 
    --bg-blob-3: rgba(56, 189, 248, 0.12);
    --accent-shadow: rgba(249, 115, 22, 0.06);
}

/* Evening Theme */
.theme-evening { 
    --bg-deep: #130919; 
    --bg-center: #251133; 
    --accent-primary: #c084fc; 
    --accent-secondary: #f472b6; 
    --accent-tertiary: #fb7185; 
    --accent-glow: rgba(192, 132, 252, 0.35); 
    --bg-blob-1: rgba(192, 132, 252, 0.18); 
    --bg-blob-2: rgba(244, 114, 182, 0.15); 
    --bg-blob-3: rgba(251, 113, 133, 0.12);
    --accent-shadow: rgba(244, 114, 182, 0.06);
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-deep); color: #ffffff;
    overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
    -webkit-tap-highlight-color: transparent; selection-background-color: var(--accent-primary);
    padding-top: var(--safe-top); transition: background-color 1.5s ease;
}

/* Liquid Mesh Background (Now Syncs with Time) */
.liquid-universe { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 50%, var(--bg-center), var(--bg-deep)); overflow: hidden; transform-style: preserve-3d; perspective: 1000px; }
.liquid-universe::before {
    content: ''; position: absolute; inset: -50%;
    background: radial-gradient(circle at 20% 30%, var(--bg-blob-1), transparent 60%),
                radial-gradient(circle at 80% 70%, var(--bg-blob-2), transparent 60%),
                radial-gradient(circle at 40% 80%, var(--bg-blob-3), transparent 60%);
    animation: fluidShift 25s ease-in-out infinite alternate; filter: blur(80px); will-change: transform, opacity; transform-origin: center;
}

@keyframes fluidShift {
    0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); opacity: 0.5; }
    33% { transform: translate3d(4%, -3%, 0) scale(1.05) rotate(3deg); opacity: 0.7; }
    66% { transform: translate3d(-3%, 5%, 0) scale(0.95) rotate(-2deg); opacity: 0.6; }
    100% { transform: translate3d(-5%, -2%, 0) scale(1.02) rotate(1deg); opacity: 0.5; }
}

.orb { position: absolute; border-radius: 50%; filter: blur(clamp(40px, 10vw, 140px)); opacity: 0.45; animation: drift 80s infinite alternate ease-in-out; mix-blend-mode: screen; box-shadow: 0 0 80px var(--accent-glow), 0 0 150px var(--accent-shadow); will-change: transform, opacity; }
.orb-1 { width: clamp(280px, 80vw, 500px); height: clamp(280px, 80vw, 500px); background: radial-gradient(circle, var(--accent-primary), transparent 70%); top: 5%; left: -5%; animation-duration: 90s; }
.orb-2 { width: clamp(240px, 75vw, 450px); height: clamp(240px, 75vw, 450px); background: radial-gradient(circle, var(--accent-secondary), transparent 70%); bottom: 5%; right: -5%; animation-delay: -20s; animation-duration: 100s; }
.orb-3 { width: clamp(180px, 55vw, 350px); height: clamp(180px, 55vw, 350px); background: radial-gradient(circle, var(--accent-tertiary), transparent 70%); top: 40%; left: 30%; opacity: 0.35; animation-delay: -35s; animation-duration: 110s; }

.orb-particle { position: absolute; border-radius: 50%; filter: blur(clamp(25px, 6vw, 45px)); mix-blend-mode: screen; animation: particleFluid 60s infinite ease-in-out alternate; opacity: 0.25; will-change: transform, opacity; }
.orb-particle-1 { width: clamp(120px, 30vw, 180px); height: clamp(120px, 30vw, 180px); background: radial-gradient(circle, var(--accent-primary), transparent 70%); top: 60%; left: 15%; animation-delay: -10s; }
.orb-particle-2 { width: clamp(100px, 25vw, 150px); height: clamp(100px, 25vw, 150px); background: radial-gradient(circle, var(--accent-tertiary), transparent 70%); top: 20%; left: 70%; animation-delay: -30s; }
.orb-particle-3 { width: clamp(80px, 20vw, 120px); height: clamp(80px, 20vw, 120px); background: radial-gradient(circle, var(--accent-secondary), transparent 70%); top: 70%; left: 80%; animation-delay: -45s; }

@keyframes drift { 0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); } 33% { transform: translate3d(8%, 5%, 0) scale(1.05) rotate(15deg); } 66% { transform: translate3d(-5%, 10%, 0) scale(0.95) rotate(-10deg); } 100% { transform: translate3d(15%, -5%, 0) scale(1.1) rotate(25deg); } }
@keyframes particleFluid { 0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); } 33% { transform: translate3d(10%, -15%, 0) scale(1.1) rotate(20deg); } 66% { transform: translate3d(-8%, 12%, 0) scale(0.95) rotate(-15deg); } 100% { transform: translate3d(12%, 8%, 0) scale(1.05) rotate(10deg); } }

.noise { position: fixed; inset: 0; z-index: -1; opacity: 0.025; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }

/* UI Components */
.glass-panel {
    background: linear-gradient(135deg, var(--glass-surface), rgba(255,255,255,0.01));
    backdrop-filter: blur(35px) saturate(160%); -webkit-backdrop-filter: blur(35px) saturate(160%);
    border: 0.5px solid var(--glass-border); border-top: 0.5px solid rgba(255, 255, 255, 0.22); border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35), inset 0 0 0 1px rgba(255, 255, 255, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.1);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s ease;
}
.glass-panel:active { transform: scale(0.99); }

.tab-content { display: none; height: 100%; animation: flowIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.tab-content.active { display: flex; flex-direction: column; }
@keyframes flowIn { 0% { opacity: 0; transform: scale(0.96) translateY(20px); filter: blur(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } }

.liquid-input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.liquid-input:focus-within { background: rgba(255, 255, 255, 0.06); border-color: var(--accent-primary); box-shadow: 0 0 30px var(--accent-glow); }
textarea { background: transparent !important; border: none !important; outline: none !important; color: rgba(255,255,255,0.9); transition: color 0.3s; }

.btn-fluid { background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85)); color: #0f172a; border-radius: 24px; font-weight: 600; position: relative; overflow: hidden; transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1); box-shadow: 0 10px 30px -5px rgba(255, 255, 255, 0.15); }
.btn-fluid:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 15px 40px -5px var(--accent-glow); }
.btn-fluid:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
.btn-fluid::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent); transition: left 0.6s ease; z-index: 0; }
.btn-fluid:hover::before { left: 100%; }

/* Fluid Glass Loader */
.fluid-glass-loader { position: relative; width: 46px; height: 46px; border-radius: 50%; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px) saturate(150%); -webkit-backdrop-filter: blur(12px) saturate(150%); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25), inset 0 2px 4px rgba(255, 255, 255, 0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 15px var(--accent-glow)); }
.fluid-glass-loader::before, .fluid-glass-loader::after { content: ''; position: absolute; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; filter: blur(4px); opacity: 0.9; mix-blend-mode: screen; }
.fluid-glass-loader::before { width: 80%; height: 80%; background: var(--accent-primary); top: 0; left: -10%; animation: glassFluid1 2.5s infinite alternate ease-in-out; }
.fluid-glass-loader::after { width: 70%; height: 70%; background: var(--accent-secondary); bottom: -10%; right: 0; animation: glassFluid2 3s infinite alternate-reverse ease-in-out; }
.fluid-glass-loader-overlay { position: absolute; inset: 2px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 40%, rgba(255,255,255,0.05) 100%); z-index: 2; pointer-events: none; }
@keyframes glassFluid1 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 100% { transform: translate(30%, 20%) scale(1.2) rotate(90deg); } }
@keyframes glassFluid2 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 100% { transform: translate(-30%, -20%) scale(1.15) rotate(-90deg); } }

/* Dock */
.dock-wrap { position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: fit-content; z-index: 1000; }
.dock { display: flex; gap: 10px; padding: 10px; border-radius: 36px; background: rgba(15, 15, 20, 0.65); backdrop-filter: blur(35px) saturate(150%); border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1); }
.dock-item { width: 52px; height: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 22px; color: rgba(255,255,255,0.5); transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1); position: relative; border: 1px solid transparent; }
.dock-item:active { transform: scale(0.9); }
.dock-item.active { background: rgba(255, 255, 255, 0.12); color: #ffffff; border-color: rgba(255,255,255,0.15); box-shadow: 0 8px 20px rgba(0,0,0,0.2); transform: translateY(-3px); }
.dock-item svg { width: 22px; height: 22px; z-index: 1; stroke-width: 2; }
.active-glow { position: absolute; bottom: 5px; width: 4px; height: 4px; background: var(--accent-primary); border-radius: 50%; filter: blur(1.5px); box-shadow: 0 0 10px var(--accent-primary), 0 0 20px var(--accent-secondary); opacity: 0; transition: all 0.4s ease; }
.active .active-glow { opacity: 1; transform: scale(1.4); }

.text-accent-primary { color: var(--accent-primary); transition: color 0.8s ease; }
.bg-accent-primary { background-color: var(--accent-primary); transition: background-color 0.8s ease; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body>
    <div class="liquid-universe">
        <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
        <div class="orb-particle orb-particle-1"></div><div class="orb-particle orb-particle-2"></div><div class="orb-particle orb-particle-3"></div>
    </div>

    <div class="max-w-md mx-auto w-full h-full flex flex-col px-6 relative z-10">

            <div class="flex items-center justify-between">
                <div>

                    <div class="flex items-center gap-2 mt-2">

            <div id="content-search" class="tab-content">
                <div class="liquid-input p-1.5 flex items-center mb-6 shadow-lg shadow-accent-glow">
                    <input type="text" id="searchInput" class="flex-1 bg-transparent px-5 py-4 outline-none text-sm font-light placeholder-white/30" placeholder="Query neural archives...">
                    <button onclick="runSearch()" class="w-11 h-11 rounded-[20px] bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all hover:scale-105 active:scale-95">

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwKnAJ0mZ_p45d9aqUHY30uAcNWpGDPrSM6XTwyBLsJ5uH49M2TS-CTASTedaHOM2OJ/exec";

function updateGreeting() {
    let hr;
    try {
        // 強制使用台灣時間 (Asia/Taipei)
        const now = new Date();
        const options = { timeZone: 'Asia/Taipei', hour: 'numeric', hourCycle: 'h23' };
        const formatter = new Intl.DateTimeFormat('en-US', options);
        hr = parseInt(formatter.format(now));
    } catch (e) {
        // 如果瀏覽器不支援 Intl API，作為 fallback
        hr = new Date().getHours();
    }
    
    if (isNaN(hr)) hr = new Date().getHours();

    let themeClass = hr >= 5 && hr < 12 ? "theme-morning" : 
                     hr >= 12 && hr < 18 ? "theme-afternoon" : 
                     hr >= 18 && hr < 22 ? "theme-evening" : "theme-night";
                     
    let greeting = hr >= 5 && hr < 12 ? "Good Morning, Jack" : 
                   hr >= 12 && hr < 18 ? "Good Afternoon, Jack" : 
                   hr >= 18 && hr < 22 ? "Good Evening, Jack" : "Good Night, Jack";
    
    const el = document.getElementById('greetingText');
    if (el.textContent !== greeting) {
        el.style.opacity = "0";
        setTimeout(() => { el.textContent = greeting; el.style.opacity = "1"; }, 300);
    }
    
    document.documentElement.className = themeClass;
}

window.onload = () => { 
    updateGreeting(); 
    // 每 15 分鐘重新檢查一次時間 (15 * 60 * 1000)
    setInterval(updateGreeting, 900000); 
};

function showTab(tab) {
    document.querySelectorAll('.tab-content, .dock-item').forEach(el => el.classList.remove('active'));
    document.getElementById('content-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
}

async function submitNote() {
    const btn = document.getElementById('btn-submit'), text = document.getElementById('noteInput').value;
    if(!text) return;
    const og = btn.innerText; btn.innerText = "Syncing..."; btn.style.opacity = "0.7";
    try {
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify({ action: 'submit', content: text }) });
        document.getElementById('noteInput').value = ""; btn.innerText = "Captured";
    } catch(e) { btn.innerText = "Retry"; }
    setTimeout(() => { btn.innerText = og; btn.style.opacity = "1"; }, 2000);
}

async function runSearch() {
    const query = document.getElementById('searchInput').value, resDiv = document.getElementById('searchResult');
    resDiv.classList.remove('hidden');
    resDiv.innerHTML = `<div class='py-12 flex flex-col items-center'><div class='fluid-glass-loader mb-6'><div class='fluid-glass-loader-overlay'></div></div><div class='text-[9px] tracking-[0.3em] opacity-40 uppercase'>Scanning Neural Web...</div></div>`;
    try {
        const res = await fetch(`${GAS_URL}?action=search&q=${encodeURIComponent(query)}`);
        const data = await res.json();
        resDiv.innerHTML = `<div class='text-accent-primary text-[9px] mb-4 tracking-[0.3em] uppercase font-bold'>Fragment Retrieved</div><div class="opacity-90 leading-relaxed">${data.answer}</div>`;
    } catch(e) { resDiv.innerHTML = "<div class='text-white/50'>Search unavailable.</div>"; }
}

async function fetchPasteboard() {
    const list = document.getElementById('pasteList'), p = document.getElementById('sync-placeholder');
    if(p.classList.contains('hidden')) list.innerHTML = "<div class='flex justify-center py-10'><div class='fluid-glass-loader'><div class='fluid-glass-loader-overlay'></div></div></div>";
    else p.innerHTML = "<div class='fluid-glass-loader' style='transform: scale(1.4)'><div class='fluid-glass-loader-overlay'></div></div>";

    try {
        const items = await (await fetch(`${GAS_URL}?action=getPaste`)).json();
        p.classList.add('hidden'); list.innerHTML = "";
        if(items.length === 0) {
            p.classList.remove('hidden');
            p.innerHTML = "<div class='w-16 h-16 rounded-full glass-panel flex items-center justify-center mb-4'><svg class='h-6 w-6 text-white/20' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4' /></svg></div><p class='text-[10px] text-white/30 tracking-[0.2em]'>Buffer Empty</p>";
            return;
        }
        items.forEach((item, i) => {
            const div = document.createElement('div');
            div.style.animationDelay = `${i * 0.05}s`;
            div.className = "glass-panel p-6 rounded-3xl active:scale-[0.97] transition-all animate-[flowIn_0.5s_ease-out_forwards] cursor-pointer border-white/5";
            
            let content = item.content;
            if (content.startsWith("[IMG]")) {
                const imgUrl = content.replace("[IMG]", "");
                content = `<img src="${imgUrl}" class="w-full rounded-xl mt-3 border border-white/10" alt="Cloud Image">`;
            }
            div.innerHTML = `<div class='text-[8px] text-accent-primary mb-2 font-bold tracking-widest uppercase transition-colors'>Cloud Fragment</div><div class='text-sm text-white/80 font-light leading-relaxed break-words'>${content}</div>`;
            
            div.onclick = () => {
                if(item.content.startsWith("[IMG]")) {
                    window.open(item.content.replace("[IMG]", ""), "_blank");
                    fetch(`${GAS_URL}?action=deletePaste&id=${item.id}`).then(() => fetchPasteboard());
                } else copyAndDelete(item.id, item.content);
            };
            list.appendChild(div);
        });
    } catch (e) {
        if(p.classList.contains('hidden')) list.innerHTML = "<div class='text-accent-secondary text-center py-8'>Sync Failed</div>";
        else p.innerHTML = "<p class='text-accent-secondary text-[10px] tracking-widest'>SYNC FAILED</p>";
    }
}

async function copyAndDelete(id, text) {
    try { await navigator.clipboard.writeText(text); await fetch(`${GAS_URL}?action=deletePaste&id=${id}`); fetchPasteboard(); } 
    catch(e) { console.error(e); }
}

async function submitWebPaste() {
    const text = document.getElementById('webPasteInput').value, btn = document.getElementById('btn-paste-text');
    if(!text) return;
    const og = btn.innerText; btn.innerText = "UP...";
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify({ action: 'submitPaste', content: text }) });
    document.getElementById('webPasteInput').value = ""; btn.innerText = "Done";
    setTimeout(() => btn.innerText = og, 1500);
}

function uploadImage() {
    const file = document.getElementById('imageInput').files[0];
    if (!file) return;
    const btn = document.getElementById('btn-paste-text');
    const og = btn.innerText; btn.innerText = "UP..."; btn.disabled = true;

    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            await fetch(GAS_URL, {
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'submitImagePaste', base64: e.target.result })
            });
            document.getElementById('imageInput').value = ""; btn.innerText = "Done";
        } catch(err) { btn.innerText = "Fail"; }
        setTimeout(() => { btn.innerText = og; btn.disabled = false; }, 1500);
    };
    reader.readAsDataURL(file);
}
</script>
