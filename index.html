<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brain Mirror v4.1 | Stable Liquid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --liquid-primary: #6366f1;
            --liquid-secondary: #ec4899;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* iOS 26 Liquid Background */
        .liquid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111827, #020617);
        }

        .blob {
            position: absolute;
            width: 60vw; height: 60vw;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.2;
            animation: fluidMove 20s infinite alternate ease-in-out;
        }
        .blob-1 { background: var(--liquid-primary); top: -10%; left: -10%; }
        .blob-2 { background: var(--liquid-secondary); bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes fluidMove {
            from { transform: translate(0, 0) scale(1) rotate(0deg); }
            to { transform: translate(20%, 15%) scale(1.3) rotate(120deg); }
        }

        /* Liquid Glass Glassmorphism */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* Main Container Adjustments */
        main {
            flex: 1;
            padding-bottom: 120px; /* 為底部導航留出空間 */
        }

        .tab-content { 
            display: none; 
            height: 100%;
            animation: liquidIn 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .tab-content.active { display: flex; flex-direction: column; }

        @keyframes liquidIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* Navigation Bar (The Fixed Buggy Part) */
        .dock-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .dock {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px;
            border-radius: 35px;
        }

        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            flex: 1;
        }

        .dock-item.active {
            color: #ffffff;
            transform: translateY(-4px);
        }

        .active-dot {
            width: 5px; height: 5px;
            background: var(--liquid-primary);
            box-shadow: 0 0 12px var(--liquid-primary);
            border-radius: 50%;
            margin-top: 6px;
            opacity: 0;
            transition: 0.3s;
        }
        .active .active-dot { opacity: 1; }

        /* Button & Inputs */
        .btn-liquid {
            background: #ffffff;
            color: #000000;
            border-radius: 24px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-liquid:active { transform: scale(0.95); opacity: 0.8; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="max-w-md mx-auto w-full h-full flex flex-col px-6">
        
        <!-- Header -->
        <header class="pt-16 pb-8">
            <h1 class="text-3xl font-light">Mirror <span class="font-semibold">Jack</span></h1>
            <p id="status-line" class="text-[9px] tracking-[0.4em] text-white/20 uppercase mt-2">Core Synchronization Active</p>
        </header>

        <!-- Main Content Area -->
        <main class="overflow-hidden">
            
            <!-- Tab: Capture -->
            <div id="content-submit" class="tab-content active">
                <div class="liquid-glass rounded-[40px] p-6 flex-1 flex flex-col mb-4">
                    <textarea id="noteInput" class="w-full flex-1 bg-transparent text-xl font-light outline-none resize-none placeholder-white/10 no-scrollbar" placeholder="記錄此瞬的心流..."></textarea>
                    <button onclick="submitNote()" id="btn-submit" class="btn-liquid py-4 mt-4 text-sm uppercase tracking-widest">Capture</button>
                </div>
            </div>

            <!-- Tab: Search -->
            <div id="content-search" class="tab-content">
                <div class="liquid-glass rounded-3xl p-2 flex items-center mb-6">
                    <input type="text" id="searchInput" class="flex-1 bg-transparent px-4 py-3 outline-none" placeholder="檢索思緒...">
                    <button onclick="runSearch()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">🔍</button>
                </div>
                <div id="searchResult" class="liquid-glass rounded-[32px] p-6 text-sm text-white/60 hidden overflow-y-auto no-scrollbar"></div>
            </div>

            <!-- Tab: Sync -->
            <div id="content-paste" class="tab-content">
                <div class="liquid-glass rounded-3xl p-5 mb-6">
                    <div class="flex gap-2">
                        <input type="text" id="webPasteInput" class="flex-1 bg-white/5 rounded-xl px-4 py-2 text-sm outline-none border border-white/5" placeholder="Web → Neural">
                        <button onclick="submitWebPaste()" class="text-indigo-400 text-xs font-bold px-2">PUSH</button>
                    </div>
                </div>

                <div id="sync-placeholder" class="flex-1 flex flex-col items-center justify-center border border-dashed border-white/10 rounded-[40px] mb-4">
                    <p class="text-[10px] text-white/20 tracking-widest mb-6">READY FOR SCAN</p>
                    <button onclick="fetchPasteboard()" class="px-10 py-3 bg-white/5 rounded-full text-xs font-medium border border-white/10 hover:bg-white/10 transition-all">Deep Scan</button>
                </div>

                <div id="pasteList" class="flex-1 space-y-4 overflow-y-auto no-scrollbar"></div>
            </div>

        </main>

        <!-- Fixed Bottom Dock (REBUILT) -->
        <div class="dock-container">
            <nav class="liquid-glass dock">
                <button onclick="showTab('submit')" id="tab-submit" class="dock-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                    </svg>
                    <div class="active-dot"></div>
                </button>

                <button onclick="showTab('search')" id="tab-search" class="dock-item">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <div class="active-dot"></div>
                </button>

                <button onclick="showTab('paste')" id="tab-paste" class="dock-item">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                    </svg>
                    <div class="active-dot"></div>
                </button>
            </nav>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwKnAJ0mZ_p45d9aqUHY30uAcNWpGDPrSM6XTwyBLsJ5uH49M2TS-CTASTedaHOM2OJ/exec"; 

        // 1. Tab Switching Fix
        function showTab(tab) {
            // Hide all content
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            // Reset all dock items
            document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));

            // Activate target
            document.getElementById('content-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');

            // Haptic feedback placeholder
            if (window.navigator.vibrate) window.navigator.vibrate(5);
        }

        // 2. Capture Action
        async function submitNote() {
            const text = document.getElementById('noteInput').value;
            if(!text) return;
            const btn = document.getElementById('btn-submit');
            btn.innerText = "Syncing...";
            btn.disabled = true;
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'submit', content: text }) });
            document.getElementById('noteInput').value = "";
            btn.innerText = "Captured";
            setTimeout(() => { btn.innerText = "Capture"; btn.disabled = false; }, 2000);
        }

        // 3. Search Action
        async function runSearch() {
            const query = document.getElementById('searchInput').value;
            const resDiv = document.getElementById('searchResult');
            resDiv.classList.remove('hidden');
            resDiv.innerHTML = "<div class='py-4 text-center opacity-20 text-xs tracking-widest animate-pulse'>SEARCHING NEURAL NETWORK...</div>";
            const res = await fetch(`${GAS_URL}?action=search&q=${encodeURIComponent(query)}`);
            const data = await res.json();
            resDiv.innerHTML = `<div class='text-indigo-400 text-[10px] mb-4 tracking-[0.2em] uppercase font-bold'>Memory Fragment</div>${data.answer}`;
        }

        // 4. Sync (Paste) Action
        async function fetchPasteboard() {
            const list = document.getElementById('pasteList');
            const placeholder = document.getElementById('sync-placeholder');
            placeholder.innerHTML = "<div class='animate-spin h-5 w-5 border-2 border-indigo-500 border-t-transparent rounded-full'></div>";
            
            try {
                const response = await fetch(`${GAS_URL}?action=getPaste`);
                const items = await response.json();
                placeholder.classList.add('hidden');
                list.innerHTML = "";
                
                if(items.length === 0) {
                    placeholder.classList.remove('hidden');
                    placeholder.innerHTML = "<p class='text-[10px] text-white/20 tracking-widest mb-6'>NO DATA FOUND</p><button onclick='fetchPasteboard()' class='px-10 py-3 bg-white/5 rounded-full text-xs'>Retry Scan</button>";
                    return;
                }
                
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "liquid-glass p-6 rounded-3xl active:scale-95 transition-all";
                    div.innerHTML = `<div class='text-[8px] text-indigo-400 mb-2 font-bold tracking-widest'>NEURAL CLOUD</div><div class='text-sm text-white/70'>${item.content}</div>`;
                    div.onclick = () => copyAndDelete(item.id, item.content);
                    list.appendChild(div);
                });
            } catch (e) {
                placeholder.innerHTML = "<p class='text-rose-500 text-xs'>Sync Error</p>";
            }
        }

        async function copyAndDelete(id, text) {
            await navigator.clipboard.writeText(text);
            await fetch(`${GAS_URL}?action=deletePaste&id=${id}`);
            fetchPasteboard();
        }

        async function submitWebPaste() {
            const text = document.getElementById('webPasteInput').value;
            if(!text) return;
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'submitPaste', content: text }) });
            document.getElementById('webPasteInput').value = "";
            alert("Fragment Uploaded");
        }
    </script>
</body>
</html>
