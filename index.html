<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Mirror</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
        }
        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }
        .glass-dark {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab-content { display: none; transition: all 0.3s ease; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { background: rgba(255, 255, 255, 0.3); color: white; border-radius: 12px; }
        input, textarea { background: rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body class="text-white min-h-screen p-4 flex justify-center items-center">

    <div class="max-w-md w-full glass rounded-[40px] overflow-hidden flex flex-col min-h-[600px]">
        
        <!-- App Header -->
        <div class="p-8 pb-4">
            <h1 class="text-3xl font-light tracking-tight">Brain Mirror</h1>
            <p class="text-white/60 text-sm">Synchronizing your fragments...</p>
        </div>

        <!-- Glass Navigation Pill -->
        <div class="px-6 pb-4">
            <div class="flex glass-dark p-1 rounded-2xl">
                <button onclick="showTab('submit')" id="tab-submit" class="flex-1 py-2 text-sm font-medium transition active-tab">Input</button>
                <button onclick="showTab('search')" id="tab-search" class="flex-1 py-2 text-sm font-medium transition text-white/70">Search</button>
                <button onclick="showTab('paste')" id="tab-paste" class="flex-1 py-2 text-sm font-medium transition text-white/70">Paste</button>
            </div>
        </div>

        <!-- Tab 1: Submission -->
        <div id="content-submit" class="tab-content active px-8 py-4">
            <label class="text-xs font-semibold uppercase tracking-widest text-white/50 block mb-2 ml-1">Daily Fragments</label>
            <textarea id="noteInput" class="w-full h-48 p-4 border-none rounded-3xl outline-none focus:ring-2 focus:ring-white/30 transition text-lg" placeholder="Record a thought or word..."></textarea>
            <button onclick="submitNote()" id="btn-submit" class="w-full mt-6 bg-white text-indigo-700 py-4 rounded-3xl font-semibold shadow-lg active:scale-95 transition transform">Save to Brain</button>
        </div>

        <!-- Tab 2: Search -->
        <div id="content-search" class="tab-content px-8 py-4">
            <label class="text-xs font-semibold uppercase tracking-widest text-white/50 block mb-2 ml-1">Semantic Inquiry</label>
            <div class="flex gap-2 mb-6">
                <input type="text" id="searchInput" class="flex-1 p-3 px-5 border-none rounded-2xl outline-none focus:ring-2 focus:ring-white/30" placeholder="Search concept...">
                <button onclick="runSearch()" class="bg-white/20 px-6 rounded-2xl hover:bg-white/30 transition">🔍</button>
            </div>
            <div id="searchResult" class="p-5 glass-dark rounded-3xl text-white/90 hidden leading-relaxed text-sm"></div>
        </div>

        <!-- Tab 3: Pasteboard -->
        <div id="content-paste" class="tab-content px-8 py-4">
            <label class="text-xs font-semibold uppercase tracking-widest text-white/50 block mb-2 ml-1">Bilateral Cloud</label>
            <div class="mb-8">
                <input type="text" id="webPasteInput" class="w-full p-3 px-5 border-none rounded-2xl outline-none mb-3" placeholder="Web to Line...">
                <button onclick="submitWebPaste()" class="w-full bg-indigo-500/50 text-white py-3 rounded-2xl font-medium text-sm hover:bg-indigo-500/70 transition">Send to Pasteboard</button>
            </div>

            <button onclick="fetchPasteboard()" class="w-full py-2 mb-4 text-xs font-semibold text-white/40 uppercase tracking-tighter hover:text-white transition">Click to Inquire</button>
            
            <div id="pasteList" class="space-y-3 max-h-60 overflow-y-auto pr-2">
                <!-- Items list -->
            <div class="flex gap-2 mb-4">
    <button onclick="fetchPasteboard()" class="flex-[3] bg-blue-600 text-white py-3 rounded-2xl font-bold hover:bg-blue-700 transition">Inquire</button>
    <button onclick="clearPasteboardWeb()" class="flex-1 bg-white/10 text-white/60 py-3 rounded-2xl font-bold hover:bg-red-500/20 hover:text-red-300 transition">Clear</button>
</div>
                
            </div>
        </div>

        <!-- Bottom Status -->
        <div class="mt-auto p-6 text-center">
            <div class="w-12 h-1 bg-white/20 mx-auto rounded-full"></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwKnAJ0mZ_p45d9aqUHY30uAcNWpGDPrSM6XTwyBLsJ5uH49M2TS-CTASTedaHOM2OJ/exec"; // REPLACE THIS

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('button').forEach(b => {
                b.classList.remove('active-tab');
                b.classList.add('text-white/70');
            });
            document.getElementById('content-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active-tab');
            document.getElementById('tab-' + tab).classList.remove('text-white/70');
        }

        async function submitNote() {
            const text = document.getElementById('noteInput').value;
            if(!text) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Syncing...";

            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'submit', content: text })
            });

            alert("Saved to cache.");
            document.getElementById('noteInput').value = "";
            btn.disabled = false; btn.innerText = "Save to Brain";
        }

        async function runSearch() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            const resDiv = document.getElementById('searchResult');
            resDiv.innerText = "Consulting Gemini..."; resDiv.classList.remove('hidden');

            const response = await fetch(`${GAS_URL}?action=search&q=${encodeURIComponent(query)}`);
            const data = await response.json();
            resDiv.innerText = data.answer;
        }

        async function submitWebPaste() {
            const text = document.getElementById('webPasteInput').value;
            if(!text) return;
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'submitPaste', content: text })
            });
            alert("Sent to Pasteboard.");
            document.getElementById('webPasteInput').value = "";
        }

        async function fetchPasteboard() {
            const list = document.getElementById('pasteList');
            list.innerHTML = "<div class='text-center animate-pulse py-4'>Inquiring...</div>";
            const response = await fetch(`${GAS_URL}?action=getPaste`);
            const items = await response.json();
            list.innerHTML = "";
            if(items.length === 0) { list.innerHTML = "<div class='text-center text-white/30 py-4'>Empty</div>"; return; }
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-4 glass-dark rounded-2xl cursor-pointer hover:bg-white/10 transition transform active:scale-95";
                div.innerHTML = `<div class='text-[10px] text-white/40 mb-1'>${item.created_at}</div><div class='text-sm'>${item.content}</div>`;
                div.onclick = () => copyAndDelete(item.id, item.content);
                list.appendChild(div);
            });
        }

        async function copyAndDelete(id, text) {
            await navigator.clipboard.writeText(text);
            alert("Copied. Entry cleared.");
            await fetch(`${GAS_URL}?action=deletePaste&id=${id}`);
            fetchPasteboard();
        }

        async function clearPasteboardWeb() {
    if(!confirm("Clear all items in pasteboard?")) return;
    await fetch(`${GAS_URL}?action=clearPaste`);
    alert("Pasteboard cleared.");
    fetchPasteboard(); // Refresh the list
}
    </script>
</body>
</html>
