<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Mirror v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.15); }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 0;
            overflow: hidden; /* Prevent body scroll, use container scroll */
            background: #0f172a;
        }

        /* Animated Mesh Background */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            filter: blur(80px);
            animation: meshMove 20s ease infinite alternate;
        }
        @keyframes meshMove { 
            from { transform: scale(1); } 
            to { transform: scale(1.2) rotate(5deg); } 
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-content { display: none; height: calc(100vh - 180px); overflow-y: auto; }
        .tab-content.active { display: block; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .dock-item.active { background: rgba(255, 255, 255, 0.2); transform: translateY(-5px); color: #fff; }
        .indicator { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: #fb7185; border-radius: 50%; box-shadow: 0 0 10px #fb7185; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="text-white">
    <div class="mesh-bg"></div>

    <div class="max-w-md mx-auto h-screen flex flex-col relative">
        
        <!-- Dynamic Header -->
        <header class="p-8 pt-12">
            <h1 id="greeting" class="text-4xl font-semibold tracking-tight">Hello, Jack</h1>
            <p id="status-line" class="text-white/40 text-sm mt-1 italic">Mirroring fragments...</p>
        </header>

        <!-- Main Container -->
        <main class="flex-1 relative px-6">
            
            <!-- Input Tab -->
            <div id="content-submit" class="tab-content active">
                <div class="glass p-6 rounded-[32px] mt-4">
                    <textarea id="noteInput" class="w-full bg-transparent border-none text-xl h-64 outline-none resize-none placeholder-white/20" placeholder="Start typing..."></textarea>
                    <button onclick="submitNote()" id="btn-submit" class="w-full mt-4 bg-white text-slate-900 py-4 rounded-2xl font-bold active:scale-95 transition shadow-2xl">Capture</button>
                </div>
            </div>

            <!-- Search Tab -->
            <div id="content-search" class="tab-content">
                <div class="flex gap-2 glass p-2 rounded-2xl mb-6">
                    <input type="text" id="searchInput" class="flex-1 bg-transparent p-3 outline-none" placeholder="Search memories...">
                    <button onclick="runSearch()" class="bg-white/10 px-5 rounded-xl">🔍</button>
                </div>
                <div id="searchResult" class="glass p-6 rounded-[32px] text-white/80 hidden"></div>
            </div>

            <!-- Paste Tab -->
            <div id="content-paste" class="tab-content">
                <div class="glass p-5 rounded-[32px] mb-6">
                    <input type="text" id="webPasteInput" class="w-full bg-white/5 p-4 rounded-2xl outline-none mb-3" placeholder="Web → Line">
                    <button onclick="submitWebPaste()" class="w-full bg-indigo-500 text-white py-3 rounded-2xl font-bold">Paste to Cloud</button>
                </div>
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="text-xs font-bold text-white/30 uppercase tracking-widest">Active Clipboard</span>
                    <button onclick="fetchPasteboard()" class="text-xs text-indigo-400">Refresh</button>
                </div>
                <div id="pasteList" class="space-y-3 pb-24"></div>
            </div>

        </main>

        <!-- Floating Dock -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-[32px] p-2 flex items-center justify-around z-50">
            <button onclick="showTab('submit')" id="tab-submit" class="dock-item active relative p-4 flex-1 transition-all">
                <span class="text-xs font-semibold">Input</span>
            </button>
            <button onclick="showTab('search')" id="tab-search" class="dock-item p-4 flex-1 transition-all text-white/40">
                <span class="text-xs font-semibold">Search</span>
            </button>
            <button onclick="showTab('paste')" id="tab-paste" class="dock-item p-4 flex-1 transition-all text-white/40 relative">
                <span class="text-xs font-semibold">Paste</span>
                <div id="paste-indicator" class="indicator hidden"></div>
            </button>
        </nav>

    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwKnAJ0mZ_p45d9aqUHY30uAcNWpGDPrSM6XTwyBLsJ5uH49M2TS-CTASTedaHOM2OJ/exec"; 

        // 1. Dynamic Greeting
        function updateHeader() {
            const hr = new Date().getHours();
            const g = hr < 12 ? "Good Morning" : hr < 18 ? "Good Afternoon" : "Good Evening";
            document.getElementById('greeting').innerText = `${g}, Jack`;
        }
        updateHeader();

        // 2. Tab Logic
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.dock-item').forEach(b => {
                b.classList.remove('active', 'text-white');
                b.classList.add('text-white/40');
            });
            document.getElementById('content-' + tab).classList.add('active');
            const activeBtn = document.getElementById('tab-' + tab);
            activeBtn.classList.add('active', 'text-white');
            activeBtn.classList.remove('text-white/40');
            if(tab === 'paste') fetchPasteboard();
        }

        // 3. Actions
        async function submitNote() {
            const text = document.getElementById('noteInput').value;
            if(!text) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Syncing...";
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'submit', content: text }) });
            document.getElementById('noteInput').value = "";
            btn.disabled = false; btn.innerText = "Captured";
            setTimeout(() => btn.innerText = "Capture", 2000);
        }

        async function runSearch() {
            const query = document.getElementById('searchInput').value;
            const resDiv = document.getElementById('searchResult');
            resDiv.innerText = "Thinking..."; resDiv.classList.remove('hidden');
            const res = await fetch(`${GAS_URL}?action=search&q=${encodeURIComponent(query)}`);
            const data = await res.json();
            resDiv.innerText = data.answer;
        }

        async function submitWebPaste() {
            const text = document.getElementById('webPasteInput').value;
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'submitPaste', content: text }) });
            document.getElementById('webPasteInput').value = "";
            document.getElementById('paste-indicator').classList.remove('hidden');
        }

        async function fetchPasteboard() {
            const list = document.getElementById('pasteList');
            list.innerHTML = "<div class='animate-pulse text-white/20 text-center py-10'>Searching...</div>";
            const response = await fetch(`${GAS_URL}?action=getPaste`);
            const items = await response.json();
            list.innerHTML = "";
            if(items.length === 0) {
                list.innerHTML = "<div class='text-white/20 text-center py-10'>No active fragments</div>";
                document.getElementById('paste-indicator').classList.add('hidden');
                return;
            }
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "glass p-5 rounded-2xl cursor-pointer hover:bg-white/10 active:scale-95 transition transform duration-200";
                div.innerHTML = `<div class='text-[10px] text-white/30 mb-2 uppercase tracking-tighter'>Fragment extracted</div><div class='text-sm leading-relaxed'>${item.content}</div>`;
                div.onclick = () => copyAndDelete(item.id, item.content);
                list.appendChild(div);
            });
        }

        async function copyAndDelete(id, text) {
            await navigator.clipboard.writeText(text);
            await fetch(`${GAS_URL}?action=deletePaste&id=${id}`);
            fetchPasteboard();
        }
    </script>
</body>
</html>
</body>
</html>
