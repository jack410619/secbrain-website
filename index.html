<script>
    const GAS_URL = "YOUR_NEW_DEPLOYED_EXEC_URL"; // REPLACE THIS

    async function submitNote() {
        const text = document.getElementById('noteInput').value;
        if(!text) return;
        const btn = document.getElementById('btn-submit');
        btn.disabled = true; btn.innerText = "Saving...";

        // Send as text/plain to avoid CORS pre-flight blocks
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'submit', content: text })
        });

        alert("Saved!");
        document.getElementById('noteInput').value = "";
        btn.disabled = false; btn.innerText = "上傳到緩存";
    }

    async function runSearch() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;
        const resDiv = document.getElementById('searchResult');
        resDiv.innerText = "Thinking..."; resDiv.classList.remove('hidden');

        const response = await fetch(`${GAS_URL}?action=search&q=${encodeURIComponent(query)}`);
        const data = await response.json();
        resDiv.innerText = data.answer;
    }

    async function submitWebPaste() {
        const text = document.getElementById('webPasteInput').value;
        if(!text) return;
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'submitPaste', content: text })
        });
        alert("Sent to Pasteboard!");
        document.getElementById('webPasteInput').value = "";
    }

    async function fetchPasteboard() {
        const list = document.getElementById('pasteList');
        list.innerHTML = "Loading...";
        const response = await fetch(`${GAS_URL}?action=getPaste`);
        const items = await response.json();
        list.innerHTML = "";
        if(items.length === 0) { list.innerHTML = "Empty."; return; }
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = "p-3 bg-white border rounded shadow-sm cursor-pointer hover:bg-blue-50";
            div.innerHTML = `<div class='text-[10px] text-gray-400'>${item.created_at}</div><div>${item.content}</div>`;
            div.onclick = () => copyAndDelete(item.id, item.content);
            list.appendChild(div);
        });
    }

    async function copyAndDelete(id, text) {
        await navigator.clipboard.writeText(text);
        alert("Copied!");
        await fetch(`${GAS_URL}?action=deletePaste&id=${id}`);
        fetchPasteboard();
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-tab'));
        document.getElementById('content-' + tab).classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active-tab');
    }
</script>
